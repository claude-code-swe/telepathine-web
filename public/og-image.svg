    <path d="M32 4L58 18V46L32 60L6 46V18L32 4Z" stroke="#D4913D" stroke-width="2" fill="none"/>
    <path d="M32 18L44 24.5V37.5L32 44L20 37.5V24.5L32 18Z" fill="#D4913D" opacity="0.3"/>
